# SonarCloud analysis runs in CI only when SONAR_TOKEN is configured, so forks
# and contributors without the secret keep a green pipeline. Create the project
# in SonarCloud and set these to match.
sonar.projectKey=rafaelinfante_observability-stack
sonar.organization=rafaelinfante
sonar.sources=alloy,alertmanager,grafana,images,loki,prometheus,scripts,tempo,docker-compose.yml
