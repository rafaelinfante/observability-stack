global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: observability-stack

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # The service speaks Prometheus through Spring Boot Actuator. JVM, HTTP server
  # timings, HikariCP and the per-gateway Resilience4j instances all come from here.
  - job_name: payment-gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payment-gateway-service:8080']

  # Per-container CPU / memory / network.
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # Host-level metrics (limited under Docker Desktop, full on a Linux host / CI).
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
