version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: "/images/service-otel"
    schedule:
      interval: weekly

  # Keep the wrapped service pinned to its latest published commit.
  - package-ecosystem: gitsubmodule
    directory: "/"
    schedule:
      interval: weekly
