apiVersion: 1

providers:
  - name: observability-stack
    orgId: 1
    folder: 'Payment Gateway'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
