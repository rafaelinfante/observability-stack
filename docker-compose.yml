name: observability-stack

services:
  # ---- The system under observation -------------------------------------------
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: payments
      MYSQL_USER: payments
      MYSQL_PASSWORD: payments
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "3307:3306"
    restart: unless-stopped

  payment-gateway-service:
    image: payment-gateway-otel:local
    build:
      context: .
      dockerfile: images/service-otel/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      tempo:
        condition: service_started
    environment:
      DB_URL: jdbc:mysql://mysql:3306/payments
      DB_USERNAME: payments
      DB_PASSWORD: payments
      # Structured JSON logs for Alloy/Loki.
      LOG_FORMAT: ecs
      # OpenTelemetry agent wiring (the agent is baked into the image).
      OTEL_SERVICE_NAME: payment-gateway-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_TRACES_SAMPLER: always_on
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=payments,deployment.environment=local
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 3s
      start_period: 60s
      retries: 5
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ---- Metrics ----------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.12.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    restart: unless-stopped

  alert-logger:
    image: mendhak/http-https-echo:41
    environment:
      HTTP_PORT: "9095"
      LOG_WITHOUT_NEWLINE: "true"
    ports:
      - "9095:9095"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.11.1
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro
    restart: unless-stopped

  # ---- Logs -------------------------------------------------------------------
  loki:
    image: grafana/loki:3.7.3
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.17.0
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
    ports:
      - "12345:12345"
    restart: unless-stopped

  # ---- Traces -----------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.10.7
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped

  # ---- Visualization ----------------------------------------------------------
  grafana:
    image: grafana/grafana:12.4.5
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_LOG_LEVEL: warn
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  mysql-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
